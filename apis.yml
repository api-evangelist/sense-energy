aid: sense-energy
name: Sense
description: >-
  Sense is a Cambridge, Massachusetts energy-intelligence company that builds
  a residential energy monitor and machine-learning platform for real-time
  whole-home electricity disaggregation. The Sense Monitor installs in a
  home electrical panel, samples voltage and current at one million times
  per second, and uses signature-based machine-learning models to identify
  individual appliances and loads behind a single point of measurement. The
  Sense iOS, Android, and web apps surface device-level usage, always-on
  load, solar production, time-of-use cost, and goal tracking to homeowners.
  For utilities and grid operators, Sense embeds its disaggregation software
  into next-generation AMI 2.0 smart meters through partnerships with meter
  manufacturers such as Landis+Gyr, providing grid-edge visibility, fault
  detection, load-management, demand-response, and virtual-power-plant
  enablement. Sense also runs a partner program for smart-device integration
  with thermostats, EV chargers, heat pumps, and home-service providers.
  Sense has not released an official public developer API; community
  developers maintain reverse-engineered, unofficial clients in Python,
  Node.js, and Home Assistant against an undocumented and unsupported
  endpoint. Sense's revenue model is hardware sales of the consumer monitor
  and licensing of its disaggregation software to utilities and meter OEMs.
